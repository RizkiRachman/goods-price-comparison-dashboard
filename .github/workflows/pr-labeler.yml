name: PR Labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

# Limit workflow permissions
permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Auto Label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/labeler.yml
          sparse-checkout-cone-mode: false

      - name: Label PR based on files changed
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # Optional: Add comment if breaking changes detected
  breaking-change-comment:
    name: Check Breaking Changes
    runs-on: ubuntu-latest
    needs: labeler
    if: contains(github.event.pull_request.labels.*.name, 'breaking-change')
    steps:
      - name: Comment on breaking change PR
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `
            ⚠️ **Breaking Changes Detected**
            
            This PR has been labeled as **breaking-change** because it modifies:
            - API paths or schemas
            - OpenAPI specification structure
            
            **Action Required:**
            - [ ] Ensure API version has been bumped appropriately
            - [ ] Update CHANGELOG.md with migration notes
            - [ ] Consider if this requires a major version bump
            - [ ] Notify API consumers of breaking changes
            
            _This is an automated message. Please review carefully._
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
