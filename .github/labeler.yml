# PR Labeler Configuration

# ============================================
# Component Labels
# ============================================
components:
  - changed-files:
      - any-glob-to-any-file:
          - src/components/**/*

pages:
  - changed-files:
      - any-glob-to-any-file:
          - src/pages/**/*

hooks:
  - changed-files:
      - any-glob-to-any-file:
          - src/hooks/**/*

api:
  - changed-files:
      - any-glob-to-any-file:
          - src/api/**/*

types:
  - changed-files:
      - any-glob-to-any-file:
          - src/types/**/*

# ============================================
# Testing
# ============================================
tests:
  - changed-files:
      - any-glob-to-any-file:
          - src/**/*.test.*
          - src/**/*.spec.*
          - src/test/**/*
          - vitest.config.*
          - src/mocks/**/*

# ============================================
# CI/CD & Configuration
# ============================================
workflow:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**/*

config:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - package-lock.json
          - tsconfig*.json
          - vite.config.*
          - vitest.config.*
          - .eslintrc*
          - eslint.config.*
          - .editorconfig
          - .gitignore
          - .node-version
          - .nvmrc

github-config:
  - changed-files:
      - any-glob-to-any-file:
          - .github/labeler.yml
          - .github/PULL_REQUEST_TEMPLATE.md
          - .github/CODEOWNERS
          - .github/dependabot.yml
          - .github/ISSUE_TEMPLATE/**/*

# ============================================
# Documentation
# ============================================
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - README.md
          - CHANGELOG.md
          - CONTRIBUTING.md
          - LICENSE
          - docs/**/*
          - '**/*.md'

# ============================================
# Style
# ============================================
styles:
  - changed-files:
      - any-glob-to-any-file:
          - src/index.css
          - src/**/*.css
          - src/**/*.scss

# ============================================
# Dependencies
# ============================================
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - package-lock.json

# ============================================
# Release
# ============================================
release:
  - changed-files:
      - any-glob-to-any-file:
          - package.json
          - CHANGELOG.md
